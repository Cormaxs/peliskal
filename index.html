<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Peliskal | Premium Streaming</title>
    <meta name="description" content="Peliskal es tu plataforma de streaming gratuita para ver películas y series en HD.">
    <link rel="icon" href="peliskal-logo.webp" type="image/x-icon">
    <style>
        :root {
            --bg-color: #040714;
            --apple-blur: rgba(22, 22, 23, 0.85);
            --accent: #0071e3;
            --text: #f5f5f7;
            --card-radius: 12px;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
            margin: 0;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* --- NAVIGATION --- */
        nav {
            position: fixed;
            top: 0; width: 100%; 
            display: flex; flex-direction: column; align-items: center;
            padding: 10px 5%; z-index: 2000; box-sizing: border-box;
            background: linear-gradient(to bottom, rgba(0,0,0,0.9), transparent);
            transition: background 0.3s ease;
        }

        nav.scrolled {
            background: var(--apple-blur);
            backdrop-filter: blur(20px) saturate(180%);
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .nav-top {
            width: 100%;
            display: flex; justify-content: space-between; align-items: center;
            gap: 20px;
        }

        .logo { font-size: 1.4rem; font-weight: 800; letter-spacing: 3px; color: white; text-decoration: none; }

        .search-wrapper { flex: 1; max-width: 600px; position: relative; }
        
        #search {
            width: 100%; padding: 10px 20px; border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.2); background: rgba(255,255,255,0.1);
            color: white; outline: none; font-size: 0.9rem; box-sizing: border-box;
            transition: 0.3s;
        }

        .search-preview {
            position: absolute; top: 50px; width: 100%; 
            background: var(--apple-blur); backdrop-filter: blur(25px);
            border-radius: 15px; display: none; max-height: 400px;
            overflow-y: auto; z-index: 3000; border: 1px solid rgba(255,255,255,0.1);
        }

        /* --- HERO --- */
        .hero {
            height: 85vh; width: 100%; position: relative;
            display: flex; align-items: center; padding: 0 5%;
            background-size: cover; background-position: center;
            transition: background-image 0.8s ease-in-out; box-sizing: border-box;
        }

        .hero::after {
            content: ''; position: absolute; bottom: 0; left: 0; width: 100%; height: 70%;
            background: linear-gradient(to top, var(--bg-color) 20%, transparent);
        }
        
        .hero-nav-btn {
            position: absolute; top: 50%; transform: translateY(-50%);
            background: rgba(255,255,255,0.1); color: white; border: none;
            width: 50px; height: 50px; border-radius: 50%; cursor: pointer;
            z-index: 100; backdrop-filter: blur(10px); transition: 0.3s;
            display: flex; align-items: center; justify-content: center;
        }
        .hero-prev { left: 20px; }
        .hero-next { right: 20px; }

        .hero-content { z-index: 10; max-width: 650px; }
        .hero-title { font-size: clamp(2rem, 6vw, 4rem); margin: 0; font-weight: 800; line-height: 1.1; }
        
        .btn-watch {
            background: white; color: black; border: none; padding: 14px 35px;
            border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 25px;
            font-size: 1.1rem; transition: 0.3s;
        }
        .btn-watch:hover { transform: scale(1.05); background: var(--accent); color: white; }

        /* --- CARRUSELES --- */
        .row { position: relative; margin: 30px 0; padding: 0 5%; }
        .row-title { font-size: 1.4rem; font-weight: 600; margin-bottom: 15px; color: #f5f5f7; }
        
        .carousel-wrapper { position: relative; }

        .carousel-track {
            display: flex; overflow-x: auto; scroll-behavior: smooth;
            gap: 15px; padding: 10px 0; scrollbar-width: none;
        }
        .carousel-track::-webkit-scrollbar { display: none; }

        .nav-btn {
            position: absolute; top: 50%; transform: translateY(-50%);
            background: rgba(0,0,0,0.6); color: white; border: none;
            width: 40px; height: 40px; border-radius: 50%; cursor: pointer;
            z-index: 100; backdrop-filter: blur(10px); transition: 0.3s;
            display: flex; align-items: center; justify-content: center; opacity: 0;
        }
        .row:hover .nav-btn { opacity: 1; }
        .prev-btn { left: -20px; }
        .next-btn { right: -20px; }

        /* --- CARDS CON ETIQUETA --- */
        .card {
            flex: 0 0 auto; width: 180px; aspect-ratio: 2/3;
            border-radius: var(--card-radius); position: relative;
            overflow: hidden; cursor: pointer; transition: 0.4s cubic-bezier(0.2, 0, 0.2, 1);
        }
        .card:hover { transform: scale(1.05); z-index: 2; box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
        .card img { width: 100%; height: 100%; object-fit: cover; }
        
        .type-badge {
            position: absolute; top: 10px; right: 10px;
            background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(5px);
            color: white; font-size: 0.65rem; font-weight: 800;
            padding: 4px 8px; border-radius: 6px; text-transform: uppercase;
            border: 1px solid rgba(255,255,255,0.2); z-index: 5;
        }

        .card-info {
            position: absolute; bottom: 0; left: 0; width: 100%;
            padding: 20px 10px 10px;
            background: linear-gradient(to top, rgba(0,0,0,0.9), transparent);
        }
        .card-title { font-size: 0.8rem; font-weight: 500; text-align: center; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        @media (max-width: 768px) {
            body { padding-top: 110px; }
            .nav-top { flex-direction: column; gap: 12px; }
            .hero { height: 55vh; align-items: flex-end; padding-bottom: 40px; }
            .card { width: 130px; }
           
        }
    </style>
</head>
<body>

    <nav id="navbar">
        <div class="nav-top">
            <a href="index.html" class="logo">PELISKAL</a>
            <div class="search-wrapper">
                <input type="text" id="search" placeholder="Buscar películas o series..." autocomplete="off">
                <div id="search-preview" class="search-preview"></div>
            </div>
            <div class="desktop-only">
                <a href="explorar.html" style="color:white; text-decoration:none; font-size:0.9rem; opacity:0.8;">Explorar</a>
            </div>
        </div>
    </nav>

    <section class="hero" id="hero">
        <button class="hero-nav-btn hero-prev" onclick="changeHero(-1)">❮</button>
        <button class="hero-nav-btn hero-next" onclick="changeHero(1)">❯</button>
        <div id="hero-content" class="hero-content"></div>
    </section>

    <!-- Contenedor dinámico de secciones -->
    <div id="sections-container"></div>

    <!-- RESTAURACIÓN DE TU FOOTER ORIGINAL -->
    <footer style="text-align: center; padding: 20px; color: #a1a1a6; font-size: 0.8rem; margin-top: 50px;">
        <p>&copy; 2026 Peliskal. Todos los derechos reservados.</p>
        <p>Datos proporcionados por <a href="https://www.themoviedb.org/" target="_blank" style="color: var(--accent);">The Movie Database (TMDB)</a>.</p>
        <p><a href="privacy.html" style="color:inherit;">Política de Privacidad</a> | <a href="terms.html" style="color:inherit;">Términos de Servicio</a> | <a href="about.html" style="color:inherit;">Acerca de</a> | <a href="contact.html" style="color:inherit;">Contacto</a></p>
    </footer>

    <script>
        let moviesDB = [];
        let heroList = [];
        let currentHeroIdx = 0;
        let heroTimer;

        const GENRES = { action: 28, comedy: 35, drama: 18, horror: 27, scifi: 878, animation: 16, documentary: 99 };

        async function init() {
            try {
                const res = await fetch('db_completa_imdb.jsonl');
                const text = await res.text();
                moviesDB = text.split('\n').filter(l => l.trim()).map(l => JSON.parse(l));

                heroList = [...moviesDB].sort((a,b) => b.popularity - a.popularity).slice(0, 10);
                renderHero();
                startHeroTimer();

                const sections = [
                    { title: "Tendencias Populares", data: [...moviesDB].sort((a,b) => b.popularity - a.popularity).slice(0, 20) },
                    { title: "Series de TV Destacadas", data: moviesDB.filter(m => m.type === 'tv').sort((a,b) => b.popularity - a.popularity).slice(0, 20) },
                    { title: "Recién Agregadas", data: [...moviesDB].reverse().slice(0, 20) },
                    { title: "Acción y Aventura", data: filterByGenre(GENRES.action) },
                    { title: "Animación Japonesa y Global", data: filterByGenre(GENRES.animation) },
                    { title: "Terror y Suspenso", data: filterByGenre(GENRES.horror) },
                    { title: "Documentales", data: filterByGenre(GENRES.documentary) },
                    { title: "Ciencia Ficción", data: filterByGenre(GENRES.scifi) }
                ];

                const container = document.getElementById('sections-container');
                sections.forEach(sec => {
                    if(sec.data.length > 0) container.innerHTML += createRowHTML(sec.title, sec.data);
                });
            } catch (e) { console.error(e); }
        }

        function filterByGenre(id) {
            return moviesDB.filter(m => m.genres && m.genres.includes(id))
                           .sort((a,b) => b.popularity - a.popularity).slice(0, 20);
        }

        function createRowHTML(title, list) {
            const trackId = `track-${title.replace(/\s+/g, '-').toLowerCase()}`;
            return `
                <div class="row">
                    <h2 class="row-title">${title}</h2>
                    <div class="carousel-wrapper">
                        <button class="nav-btn prev-btn" onclick="scrollBtn('${trackId}', -600)">❮</button>
                        <div class="carousel-track" id="${trackId}">
                            ${list.map(m => `
                                <div class="card" onclick="verDetalle('${m.id_tmdb}')">
                                    <div class="type-badge">${m.type === 'tv' ? 'Serie' : 'Peli'}</div>
                                    <img src="https://image.tmdb.org/t/p/w342${m.poster}" loading="lazy" alt="${m.title}">
                                    <div class="card-info"><div class="card-title">${m.title}</div></div>
                                </div>
                            `).join('')}
                        </div>
                        <button class="nav-btn next-btn" onclick="scrollBtn('${trackId}', 600)">❯</button>
                    </div>
                </div>
            `;
        }

        function renderHero() {
            const m = heroList[currentHeroIdx];
            const heroEl = document.getElementById('hero');
            heroEl.style.backgroundImage = `linear-gradient(to right, #040714 20%, transparent 80%), url(https://image.tmdb.org/t/p/original${m.backdrop})`;
            document.getElementById('hero-content').innerHTML = `
                <div style="display:flex; align-items:center; gap:10px; margin-bottom:15px;">
                    <span style="background:var(--accent); color:white; padding:4px 10px; border-radius:5px; font-weight:bold; font-size:0.8rem; text-transform:uppercase;">
                        ${m.type === 'tv' ? 'Serie de TV' : 'Película'}
                    </span>
                    <span style="color:#a1a1a6; font-weight:600;">${m.release_year}</span>
                </div>
                <h1 class="hero-title">${m.title}</h1>
                <p style="color:#a1a1a6; margin: 20px 0; max-width:550px; font-size:1.1rem; line-height:1.5;">${m.overview.substring(0, 180)}...</p>
                <button class="btn-watch" onclick="verDetalle('${m.id_tmdb}')">▶ Ver Ahora</button>
            `;
        }

        function changeHero(dir) {
            clearInterval(heroTimer);
            currentHeroIdx = (currentHeroIdx + dir + heroList.length) % heroList.length;
            renderHero();
            startHeroTimer();
        }

        function startHeroTimer() {
            heroTimer = setInterval(() => {
                currentHeroIdx = (currentHeroIdx + 1) % heroList.length;
                renderHero();
            }, 8000);
        }

        function scrollBtn(id, amount) { document.getElementById(id).scrollBy({ left: amount, behavior: 'smooth' }); }

        const searchInput = document.getElementById('search');
        const preview = document.getElementById('search-preview');

        searchInput.addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase().trim();
            if (term.length < 2) { preview.style.display = 'none'; return; }
            const res = moviesDB.filter(m => m.title.toLowerCase().includes(term)).slice(0, 8);
            if(res.length > 0) {
                preview.style.display = 'block';
                preview.innerHTML = res.map(m => `
                    <div style="display:flex; align-items:center; gap:15px; padding:12px; cursor:pointer; border-bottom:1px solid rgba(255,255,255,0.05);" onclick="verDetalle('${m.id_tmdb}')">
                        <img src="https://image.tmdb.org/t/p/w92${m.poster}" width="45" style="border-radius:4px">
                        <div style="flex:1;">
                            <div style="font-weight:600; font-size:0.95rem;">${m.title}</div>
                            <div style="font-size:0.75rem; color:#a1a1a6;">${m.release_year} • <span style="color:var(--accent)">${m.type === 'tv' ? 'SERIE' : 'PELI'}</span></div>
                        </div>
                    </div>
                `).join('');
            } else preview.style.display = 'none';
        });

        function verDetalle(id) {
            const m = moviesDB.find(x => x.id_tmdb == id);
            localStorage.setItem('currentMovie', JSON.stringify(m));
            window.location.href = 'detalle.html';
        }

        window.onscroll = () => {
            const nav = document.getElementById('navbar');
            if (window.scrollY > 50) nav.classList.add('scrolled');
            else nav.classList.remove('scrolled');
        };

        init();
    </script>
</body>
</html>
