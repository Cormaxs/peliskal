<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Peliskal | Reproductor</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="peliskal-logo.webp" type="image/x-icon">
    <style>
        .container { max-width: 1200px; margin: 0 auto; padding: 20px 5%; }
        .back-link { color: var(--accent); text-decoration: none; margin-bottom: 25px; display: inline-flex; align-items: center; font-weight: 500; transition: 0.3s; cursor: pointer; }
        .back-link:hover { transform: translateX(-5px); }

        /* Reproductor */
        .video-wrapper { background: #000; border-radius: 20px; padding: 10px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.05); margin-bottom: 15px; }
        .video-container { position: relative; padding-bottom: 56.25%; height: 0; border-radius: 12px; overflow: hidden; background: #000; }
        iframe { position: absolute; top:0; left:0; width:100%; height:100%; border:0; }

        /* Controles de Serie */
        .episode-controls { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; gap: 10px; }
        .episode-nav-btn { background: var(--accent); color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .episode-nav-btn:disabled { background: #333; cursor: not-allowed; opacity: 0.5; }
        #season-select { background: #1c1c1e; color: white; border: 1px solid #333; padding: 10px; border-radius: 8px; outline: none; cursor: pointer; }

        /* Contenedores con Flechas */
        .carousel-container { position: relative; display: flex; align-items: center; margin-bottom: 30px; }
        .nav-arrow {
            position: absolute; top: 50%; transform: translateY(-50%);
            background: rgba(0,0,0,0.7); color: white; border: none;
            width: 40px; height: 40px; border-radius: 50%; cursor: pointer;
            z-index: 10; display: flex; align-items: center; justify-content: center;
            transition: 0.3s; backdrop-filter: blur(5px); border: 1px solid rgba(255,255,255,0.1);
        }
        .nav-arrow:hover { background: var(--accent); scale: 1.1; }
        .prev-arrow { left: -20px; }
        .next-arrow { right: -20px; }

        /* Carrusel de Episodios */
        .episodes-track { 
            display: flex; overflow-x: auto; gap: 15px; padding: 10px 0; 
            scroll-behavior: smooth; scrollbar-width: none; width: 100%;
        }
        .episodes-track::-webkit-scrollbar { display: none; }
        
        .ep-card { min-width: 260px; background: #1c1c1e; border-radius: 12px; overflow: hidden; cursor: pointer; transition: 0.3s; border: 2px solid transparent; }
        .ep-card.active { border-color: var(--accent); background: #2c2c2e; }
        .ep-thumb { width: 100%; aspect-ratio: 16/9; object-fit: cover; }
        .ep-info { padding: 12px; }
        .ep-number { font-size: 0.75rem; color: var(--accent); font-weight: 700; text-transform: uppercase; margin-bottom: 4px; }
        .ep-name { font-size: 0.95rem; font-weight: 500; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* Servidores */
        .server-selector { display: flex; gap: 10px; margin-bottom: 30px; background: rgba(255,255,255,0.03); padding: 10px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.05); overflow-x: auto; }
        .server-btn { background: rgba(255,255,255,0.1); color: #fff; border: none; padding: 8px 16px; border-radius: 8px; cursor: pointer; font-size: 0.85rem; font-weight: 600; transition: 0.3s; display: flex; flex-direction: column; align-items: center; min-width: fit-content; }
        .server-btn span { font-size: 0.65rem; opacity: 0.6; font-weight: 400; }
        .server-btn.active { background: var(--accent); color: white; }

        /* Similares */
        .similar-track { display: flex; overflow-x: auto; gap: 18px; padding: 10px 0; scroll-behavior: smooth; scrollbar-width: none; }
        .similar-track::-webkit-scrollbar { display: none; }
        .similar-card { min-width: 170px; aspect-ratio: 2/3; border-radius: 10px; overflow: hidden; cursor: pointer; transition: 0.3s; }
        .similar-card:hover { transform: translateY(-5px); }
        .similar-card img { width: 100%; height: 100%; object-fit: cover; }

        @media (max-width: 768px) {
            .nav-arrow { display: none; }
            .ep-card { min-width: 200px; }
            .prev-arrow, .next-arrow { display: none; }
        }
    </style>
</head>
<body>

    <nav id="navbar" class="scrolled">
        <div class="nav-top">
            <a href="index.html" class="logo">PELISKAL</a>
            <div class="search-wrapper">
                <input type="text" id="search" placeholder="Buscar películas o series..." autocomplete="off">
                <div id="search-preview" class="search-preview"></div>
            </div>
            <a href="explorar.html" style="color:white; text-decoration:none; font-size:0.9rem; font-weight:500;">Explorar</a>
        </div>
    </nav>

    <div class="container">
      <a onclick="irAtras()" class="back-link">❮ Volver</a>
        
        <div class="video-wrapper">
            <div class="video-container">
                <iframe id="player" src="" allowfullscreen referrerpolicy="origin" sandbox="allow-forms allow-pointer-lock allow-same-origin allow-scripts allow-top-navigation"></iframe>
            </div>
        </div>

        <!-- Sección de Series -->
        <div id="series-controls" style="display: none;">
            <div class="episode-controls">
                <select id="season-select" onchange="changeSeason(this.value)"></select>
                <div>
                    <button class="episode-nav-btn" id="prev-ep" onclick="navEpisode(-1)">Anterior</button>
                    <button class="episode-nav-btn" id="next-ep" onclick="navEpisode(1)">Siguiente</button>
                </div>
            </div>
            
            <div class="carousel-container">
                <button class="nav-arrow prev-arrow" onclick="sideScroll('episodes-list', -500)">❮</button>
                <div class="episodes-track" id="episodes-list"></div>
                <button class="nav-arrow next-arrow" onclick="sideScroll('episodes-list', 500)">❯</button>
            </div>
        </div>

        <div class="server-selector">
            <button class="server-btn active" onclick="switchServer('imdb', this)">Servidor Principal <span>IMDB Data</span></button>
            <button class="server-btn" onclick="switchServer('tmdb', this)">Servidor Alternativo <span>TMDB Data</span></button>
        </div>

        <div class="info">
            <h1 id="title">Cargando...</h1>
            <div class="meta" id="meta"></div>
            <p class="overview" id="overview"></p>
        </div>

        <div class="similar-section" style="margin-top: 40px;">
            <h2 style="margin-bottom: 20px; font-size: 1.5rem;">También te podría gustar</h2>
            <div class="carousel-container">
                <button class="nav-arrow prev-arrow" onclick="sideScroll('similar-track', -500)">❮</button>
                <div class="similar-track" id="similar-track"></div>
                <button class="nav-arrow next-arrow" onclick="sideScroll('similar-track', 500)">❯</button>
            </div>
        </div>
    </div>

    <!-- FOOTER ORIGINAL RESTAURADO -->
    <footer style="text-align: center; padding: 20px; color: #a1a1a6; font-size: 0.8rem; margin-top: 50px;">
        <p>&copy; 2024 Peliskal. Todos los derechos reservados.</p>
        <p>Datos proporcionados por <a href="https://www.themoviedb.org/" target="_blank" style="color: var(--accent);">The Movie Database (TMDB)</a>.</p>
        <p><a href="privacy.html">Política de Privacidad</a> | <a href="terms.html">Términos de Servicio</a> | <a href="about.html">Acerca de</a> | <a href="contact.html">Contacto</a></p>
    </footer>

    <script src="main.js"></script>
    <script>
        const movie = JSON.parse(localStorage.getItem('currentMovie'));
        const TMDB_KEY = '5e08d87138369b9e0bd46fc825dd3740'; 
        let currentS = 1;
        let currentE = 1;
        let currentServer = 'imdb';
        let totalEpisodes = 0;

        async function initPlayer() {
            if (!movie) { window.location.href = 'index.html'; return; }

            document.getElementById('title').innerText = movie.title;
            document.getElementById('overview').innerText = movie.overview;
            document.getElementById('meta').innerHTML = `
                <span>${movie.release_year}</span> 
                <span style="color: #ffd700">★ ${movie.rating}</span>
                <span style="background:rgba(255,255,255,0.1); padding:4px 8px; border-radius:4px; font-size:0.7rem;">${movie.type.toUpperCase()}</span>
            `;

            if (movie.type === 'tv' || movie.type === 'serie') {
                document.getElementById('series-controls').style.display = 'block';
                await loadSeasons();
            } else {
                loadVideo('imdb');
            }

            await loadDatabase();
            renderSimilar();
        }

        async function loadSeasons() {
            try {
                const res = await fetch(`https://api.themoviedb.org/3/tv/${movie.id_tmdb}?api_key=${TMDB_KEY}&language=es-ES`);
                const data = await res.json();
                const select = document.getElementById('season-select');
                
                data.seasons.forEach(s => {
                    if(s.season_number > 0) {
                        const opt = document.createElement('option');
                        opt.value = s.season_number;
                        opt.innerText = `Temporada ${s.season_number}`;
                        select.appendChild(opt);
                    }
                });
                await loadEpisodes(1);
            } catch (e) { console.error("Error cargando temporadas"); }
        }

        async function loadEpisodes(seasonNum) {
            currentS = seasonNum;
            const res = await fetch(`https://api.themoviedb.org/3/tv/${movie.id_tmdb}/season/${seasonNum}?api_key=${TMDB_KEY}&language=es-ES`);
            const data = await res.json();
            totalEpisodes = data.episodes.length;
            
            const list = document.getElementById('episodes-list');
            list.innerHTML = data.episodes.map(ep => `
                <div class="ep-card" onclick="playEpisode(${ep.episode_number})" id="ep-${ep.episode_number}">
                    <img class="ep-thumb" src="${ep.still_path ? 'https://image.tmdb.org/t/p/w300'+ep.still_path : 'https://via.placeholder.com/300x169?text=Peliskal'}" loading="lazy">
                    <div class="ep-info">
                        <div class="ep-number">Capítulo ${ep.episode_number}</div>
                        <div class="ep-name">${ep.name}</div>
                    </div>
                </div>
            `).join('');
            
            playEpisode(1);
        }


function playEpisode(epNum) {
    currentE = epNum;
    
    // 1. Usamos replaceState para que la URL cambie pero NO se cree una entrada nueva
    const newUrl = window.location.pathname + `?s=${currentS}&e=${currentE}`;
    window.history.replaceState({path: newUrl}, '', newUrl);

    // 2. UI: Marcar activa y scroll
    document.querySelectorAll('.ep-card').forEach(c => c.classList.remove('active'));
    const activeCard = document.getElementById(`ep-${epNum}`);
    if(activeCard) {
        activeCard.classList.add('active');
        activeCard.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
    }
    
    // 3. UI: Botones nav
    document.getElementById('prev-ep').disabled = (currentE <= 1);
    document.getElementById('next-ep').disabled = (currentE >= totalEpisodes);

    // 4. Cargar el video sin recargar la página
    loadVideo(currentServer);
}

// NUEVA FUNCIÓN: Fuerza la salida del reproductor
function irAtras() {
    // Si el usuario vino de explorar.html, volvemos ahí. 
    // Si entró directo, lo mandamos a explorar para que no se rompa la experiencia.
    if (document.referrer.includes('explorar.html')) {
        window.location.href = 'explorar.html';
    } else if (document.referrer.includes('index.html')) {
        window.location.href = 'index.html';
    } else {
        window.location.href = 'explorar.html';
    }
}


        function loadVideo(sourceType) {
            currentServer = sourceType;
            const id = (sourceType === 'imdb' && movie.id_imdb) ? movie.id_imdb : movie.id_tmdb;
            const apiBase = "https://vidapi.ru/embed";
            const settings = "?sub=es&lang=es&muted=0&autoplay=1";

            const url = movie.type === 'movie'
                ? `${apiBase}/movie/${id}${settings}`
                : `${apiBase}/tv/${id}/${currentS}/${currentE}${settings}`;
            
            document.getElementById('player').src = url;
        }

        function changeSeason(val) {
            currentE = 1;
            loadEpisodes(val);
        }

        function navEpisode(dir) {
            const newEp = currentE + dir;
            if(newEp >= 1 && newEp <= totalEpisodes) playEpisode(newEp);
        }

        function switchServer(sourceType, btnElement) {
            document.querySelectorAll('.server-btn').forEach(b => b.classList.remove('active'));
            btnElement.classList.add('active');
            loadVideo(sourceType);
        }

        function sideScroll(elementId, distance) {
            const el = document.getElementById(elementId);
            el.scrollBy({ left: distance, behavior: 'smooth' });
        }

        function renderSimilar() {
            const similar = moviesDB.filter(m => m.id_tmdb !== movie.id_tmdb).sort(() => 0.5 - Math.random()).slice(0, 15);
            document.getElementById('similar-track').innerHTML = similar.map(m => `
                <div class="similar-card" onclick="verDetalle('${m.id_tmdb}')">
                    <img src="https://image.tmdb.org/t/p/w342${m.poster}" alt="${m.title}" loading="lazy">
                </div>
            `).join('');
        }

        initPlayer();
    </script>
</body>
</html>
