<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Peliskal | Reproductor</title>
    <link rel="stylesheet" href="style.css">
     <link rel="icon" href="peliskal-logo.webp" type="image/x-icon">
    <style>
        /* Ajustes específicos para la página de detalle */
        .container { max-width: 1200px; margin: 0 auto; padding: 20px 5%; }
        
        .back-link { 
            color: var(--accent); text-decoration: none; margin-bottom: 25px; 
            display: inline-flex; align-items: center; font-weight: 500; transition: 0.3s;
        }
        .back-link:hover { transform: translateX(-5px); }

        .video-container { 
            position: relative; padding-bottom: 56.25%; height: 0; 
            background: #000; border-radius: 20px; overflow: hidden;
            box-shadow: 0 30px 60px rgba(0,0,0,0.8);
            border: 1px solid rgba(255,255,255,0.05);
        }
        iframe { position: absolute; top:0; left:0; width:100%; height:100%; border:0; }

        .info { margin-top: 40px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 40px; }
        h1 { margin: 0; font-size: 2.5rem; font-weight: 800; }
        .meta { color: #a1a1a6; margin: 15px 0; font-size: 1.1rem; display: flex; gap: 15px; align-items: center; }
        .overview { line-height: 1.6; color: #d2d2d7; font-size: 1.1rem; max-width: 800px; }

        .similar-section { margin-top: 50px; }
        .row-title { font-size: 1.5rem; font-weight: 600; margin-bottom: 20px; color: #fff; }
        
        .carousel-wrapper { position: relative; display: flex; align-items: center; }
        .carousel-track {
            display: flex; overflow-x: auto; scroll-behavior: smooth;
            gap: 18px; padding: 20px 0; scrollbar-width: none;
        }
        .carousel-track::-webkit-scrollbar { display: none; }

        .nav-btn {
            position: absolute; top: 50%; transform: translateY(-50%);
            background: rgba(255,255,255,0.1); color: white; border: none;
            width: 45px; height: 45px; border-radius: 50%; cursor: pointer;
            z-index: 100; backdrop-filter: blur(10px); transition: 0.3s;
        }
        .nav-btn:hover { background: var(--accent); }
        .prev-btn { left: -25px; }
        .next-btn { right: -25px; }

        @media (max-width: 768px) {
            h1 { font-size: 1.8rem; }
            .nav-btn { display: none; }
        }
    </style>
</head>
<body>

    <!-- NAV UNIFICADA (Igual a Index y Explorar) -->
    <nav id="navbar" class="scrolled">
        <div class="nav-top">
            <a href="index.html" class="logo">PELISKAL</a>
            <div class="search-wrapper">
                <input type="text" id="search" placeholder="Buscar películas o series..." autocomplete="off">
                <div id="search-preview" class="search-preview"></div>
            </div>
            <a href="explorar.html" style="color:white; text-decoration:none; font-size:0.9rem; font-weight:500;">Explorar</a>
        </div>
    </nav>

    <div class="container">
        <a href="index.html" class="back-link">❮ Volver al Inicio</a>
        
        <div class="video-container">
            <iframe id="player" src="" allowfullscreen referrerpolicy="origin"></iframe>
        </div>

        <div class="info">
            <h1 id="title">Cargando...</h1>
            <div class="meta" id="meta"></div>
            <p class="overview" id="overview"></p>
        </div>

        <!-- SECCIÓN SIMILARES -->
        <div class="similar-section">
            <h2 class="row-title">También te podría gustar</h2>
            <div class="carousel-wrapper">
                <button class="nav-btn prev-btn" onclick="scrollTrack(-1)">❮</button>
                <div class="carousel-track" id="similar-track"></div>
                <button class="nav-btn next-btn" onclick="scrollTrack(1)">❯</button>
            </div>
        </div>
    </div>

    <!-- Importamos la lógica central -->
    <script src="main.js"></script>
    
    <script>
        const movie = JSON.parse(localStorage.getItem('currentMovie'));

        async function initPlayer() {
            if (!movie) {
                window.location.href = 'index.html';
                return;
            }

            // 1. Configurar Info de la Película
            document.title = `${movie.title} | Peliskal`;
            document.getElementById('title').innerText = movie.title;
            document.getElementById('overview').innerText = movie.overview;
            document.getElementById('meta').innerHTML = `
                <span>${movie.release_year}</span>
                <span style="color: #ffd700">★ ${movie.rating}</span>
                <span style="background: rgba(255,255,255,0.1); padding: 4px 10px; border-radius: 6px; font-size: 0.75rem; font-weight:bold;">
                    ${movie.type.toUpperCase()}
                </span>
            `;
            
            // 2. Cargar Iframe (Película o Serie)
            const url = movie.type === 'movie'
                ? `https://streamimdb.ru/embed/movie/${movie.id_imdb}`
                : `https://streamimdb.ru/tv/${movie.id_imdb}/season/1/episode/1`;
            
            document.getElementById('player').src = url;

            // 3. Cargar Base de Datos para Buscador y Similares
            await loadDatabase(); // Función de main.js
            renderSimilar();
        }

        function renderSimilar() {
            // Recomendamos 15 películas al azar (excluyendo la que se está viendo)
            const similar = moviesDB
                .filter(m => m.id_tmdb !== movie.id_tmdb)
                .sort(() => 0.5 - Math.random())
                .slice(0, 15);

            document.getElementById('similar-track').innerHTML = similar.map(m => `
                <div class="card" style="width: 180px; aspect-ratio: 2/3;" onclick="verDetalle('${m.id_tmdb}')">
                    <img src="https://image.tmdb.org/t/p/w500${m.poster}" loading="lazy">
                    <div class="card-info">
                        <div class="card-title">${m.title}</div>
                    </div>
                </div>
            `).join('');
        }

        function scrollTrack(dir) {
            const track = document.getElementById('similar-track');
            track.scrollBy({ left: dir * 450, behavior: 'smooth' });
        }

        initPlayer();
    </script>
</body>
</html>
