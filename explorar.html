<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Explorar | Peliskal</title>
    <link rel="stylesheet" href="style.css">
     <link rel="icon" href="peliskal-logo.webp" type="image/x-icon">
    <style>
        .explore-container { padding: 0 5%; max-width: 1400px; margin: 0 auto; }
        .filter-bar { display: flex; gap: 15px; margin-bottom: 30px; }
        .tab-btn {
            padding: 10px 25px; border-radius: 20px; border: none;
            background: rgba(255,255,255,0.1); color: white; cursor: pointer; transition: 0.3s;
        }
        .tab-btn.active { background: var(--accent); }
        
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 25px;
        }
        @media (max-width: 600px) {
            .grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 15px; }
        }
    </style>
</head>
<body>

    <nav id="navbar" class="scrolled">
        <div class="nav-top">
            <a href="index.html" class="logo">PELISKAL</a>
            <div class="search-wrapper">
                <input type="text" id="search" placeholder="Buscar en el catálogo..." autocomplete="off">
                <div id="search-preview" class="search-preview"></div>
            </div>
            <a href="index.html" style="color:white; text-decoration:none; font-size:0.9rem; opacity:0.7;">Inicio</a>
        </div>
    </nav>

    <main class="explore-container">
        <div class="filter-bar">
            <button class="tab-btn active" onclick="filterData('all', this)">Todos</button>
            <button class="tab-btn" onclick="filterData('movie', this)">Películas</button>
            <button class="tab-btn" onclick="filterData('tv', this)">Series</button>
        </div>

        <div class="grid" id="explore-grid"></div>
    </main>

    <script src="main.js"></script>
    <script>
        let currentType = 'all';

        async function initExplore() {
            await loadDatabase(); // Función en main.js
            renderExplore(moviesDB);
        }

        function renderExplore(list) {
            const grid = document.getElementById('explore-grid');
            grid.innerHTML = list.map(m => `
                <div class="card" onclick="verDetalle('${m.id_tmdb}')">
                    <img src="https://image.tmdb.org/t/p/w500${m.poster}" loading="lazy">
                    <div class="card-info"><div class="card-title">${m.title}</div></div>
                </div>
            `).join('');
        }

        function filterData(type, btn) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            const filtered = type === 'all' ? moviesDB : moviesDB.filter(m => m.type === type);
            renderExplore(filtered);
        }

        initExplore();
    </script>
</body>
</html>
