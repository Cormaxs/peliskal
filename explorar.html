<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Explorar | Peliskal</title>
    <meta name="description" content="Explora el catálogo completo de películas y series en Peliskal. Filtra por tipo y encuentra tu próximo entretenimiento.">
    <meta name="keywords" content="explorar, catálogo, películas, series, Peliskal">
    <meta name="author" content="Peliskal">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="peliskal-logo.webp" type="image/x-icon">
    <style>
        :root {
            --bg-color: #040714;
            --apple-blur: rgba(22, 22, 23, 0.85);
            --accent: #0071e3;
            --text: #f5f5f7;
            --card-radius: 12px;
        }

        body { 
            padding-top: 140px; 
            background-color: var(--bg-color);
            color: var(--text);
        }
        
        @media (max-width: 768px) { body { padding-top: 170px; } }
        
        .explore-container { padding: 0 5%; max-width: 1400px; margin: 0 auto; min-height: 80vh; }
        
        .filter-bar { 
            display: flex; gap: 12px; margin-bottom: 30px; flex-wrap: wrap; 
            justify-content: center;
        }

        .tab-btn {
            padding: 10px 22px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1);
            background: rgba(255,255,255,0.05); color: white; cursor: pointer; 
            transition: 0.3s; font-size: 0.9rem; font-weight: 500;
        }
        .tab-btn:hover { background: rgba(255,255,255,0.15); }
        .tab-btn.active { background: var(--accent); border-color: var(--accent); }
        
        /* --- GRID Y CARDS (Igual al Inicio) --- */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 25px;
        }

        .card {
            position: relative; border-radius: var(--card-radius);
            overflow: hidden; cursor: pointer; transition: 0.4s cubic-bezier(0.2, 0, 0.2, 1);
            aspect-ratio: 2/3; background: #1a1a1a;
        }
        .card:hover { transform: scale(1.05); z-index: 2; box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
        .card img { width: 100%; height: 100%; object-fit: cover; }
        
        /* Etiqueta Peli/Serie */
        .type-badge {
            position: absolute; top: 10px; right: 10px;
            background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(5px);
            color: white; font-size: 0.65rem; font-weight: 800;
            padding: 4px 8px; border-radius: 6px; text-transform: uppercase;
            border: 1px solid rgba(255,255,255,0.2); z-index: 5;
        }

        .card-info {
            position: absolute; bottom: 0; left: 0; width: 100%;
            padding: 20px 10px 10px;
            background: linear-gradient(to top, rgba(0,0,0,0.9), transparent);
        }
        .card-title { 
            font-size: 0.8rem; font-weight: 500; text-align: center; 
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis; 
        }

        @media (max-width: 600px) {
            .grid { grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 15px; }
            .type-badge { font-size: 0.55rem; padding: 3px 6px; }
        }
    </style>
</head>

<body>

    <nav id="navbar" class="scrolled">
        <div class="nav-top">
            <a href="index.html" class="logo">PELISKAL</a>
            <div class="search-wrapper">
                <input type="text" id="search" placeholder="Buscar en el catálogo..." autocomplete="off">
                <div id="search-preview" class="search-preview"></div>
            </div>
            <a href="index.html" style="color:white; text-decoration:none; font-size:0.9rem; font-weight: 600; opacity:0.8;">Inicio</a>
        </div>
    </nav>

    <main class="explore-container">
        <div class="filter-bar">
            <button class="tab-btn active" onclick="filterData('all', this)">Todos</button>
            <button class="tab-btn" onclick="filterData('movie', this)">Películas</button>
            <button class="tab-btn" onclick="filterData('tv', this)">Series</button>
            <button class="tab-btn" onclick="filterData('genre-28', this)">Acción</button>
            <button class="tab-btn" onclick="filterData('genre-35', this)">Comedia</button>
            <button class="tab-btn" onclick="filterData('genre-18', this)">Drama</button>
            <button class="tab-btn" onclick="filterData('genre-27', this)">Terror</button>
            <button class="tab-btn" onclick="filterData('genre-878', this)">Ciencia Ficción</button>
        </div>

        <div class="grid" id="explore-grid"></div>
        
        <!-- Spinner opcional de carga -->
        <div id="loading-trigger" style="height: 50px;"></div>
    </main>

   <script src="main.js"></script>
   <script>
    let currentList = [];
    let loadedCount = 20;
    let isLoading = false;

    // 1. Bloqueamos la restauración automática del navegador
    if ('scrollRestoration' in history) {
        history.scrollRestoration = 'manual';
    }

    async function initExplore() {
        // Cargar base de datos desde main.js o localmente
        if (typeof loadDatabase === "function") {
            await loadDatabase();
        }
        
        // Ordenar base de datos por año por defecto
        currentList = [...moviesDB].sort((a, b) => b.release_year - a.release_year);

        // 2. Recuperar estado previo de sessionStorage
        const savedCount = sessionStorage.getItem('explorarCount');
        const savedScroll = sessionStorage.getItem('explorarScroll');
        const savedFilter = sessionStorage.getItem('explorarFilter') || 'all';

        if (savedCount) loadedCount = parseInt(savedCount);

        // Aplicar filtro guardado sin scrollear al top
        applyFilterLogic(savedFilter);
        renderExplore();
        setupExploreSearch(); // Inicializar buscador

        // 3. Restaurar posición de scroll
        if (savedScroll) {
            setTimeout(() => {
                window.scrollTo(0, parseInt(savedScroll));
            }, 150);
        }
    }

    // --- LÓGICA DEL BUSCADOR (Igual a index.html) ---
    function setupExploreSearch() {
        const searchInput = document.getElementById('search');
        const preview = document.getElementById('search-preview');

        if (!searchInput) return;

        searchInput.addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase().trim();
            if (term.length < 2) { 
                preview.style.display = 'none'; 
                return; 
            }

            // Buscar en toda la base de datos, no solo en la lista filtrada
            const res = moviesDB.filter(m => m.title.toLowerCase().includes(term)).slice(0, 8);
            
            if (res.length > 0) {
                preview.style.display = 'block';
                preview.innerHTML = res.map(m => `
                    <div style="display:flex; align-items:center; gap:15px; padding:12px; cursor:pointer; border-bottom:1px solid rgba(255,255,255,0.05);" 
                         onclick="verDetalle('${m.id_tmdb}')">
                        <img src="https://image.tmdb.org/t/p/w92${m.poster}" width="45" style="border-radius:4px">
                        <div style="flex:1;">
                            <div style="font-weight:600; font-size:0.95rem; color:white;">${m.title}</div>
                            <div style="font-size:0.75rem; color:#a1a1a6;">
                                ${m.release_year} • <span style="color:var(--accent)">${m.type === 'tv' ? 'SERIE' : 'PELI'}</span>
                            </div>
                        </div>
                    </div>
                `).join('');
            } else {
                preview.style.display = 'none';
            }
        });

        // Cerrar preview al hacer click fuera
        document.addEventListener('click', (e) => {
            if (!searchInput.contains(e.target)) preview.style.display = 'none';
        });
    }

    // --- RENDERIZADO Y FILTROS ---
    function renderExplore() {
        const grid = document.getElementById('explore-grid');
        const toRender = currentList.slice(0, loadedCount);
        
        grid.innerHTML = toRender.map(m => `
            <div class="card" onclick="verDetalle('${m.id_tmdb}')">
                <div class="type-badge">${m.type === 'tv' ? 'Serie' : 'Peli'}</div>
                <img src="https://image.tmdb.org/t/p/w500${m.poster}" loading="lazy" alt="${m.title}">
                <div class="card-info">
                    <div class="card-title">${m.title}</div>
                </div>
            </div>
        `).join('');
        isLoading = false;
    }

    function applyFilterLogic(type) {
        let filtered = [...moviesDB];
        if (type === 'movie') {
            filtered = moviesDB.filter(m => m.type === 'movie');
        } else if (type === 'tv') {
            filtered = moviesDB.filter(m => m.type === 'tv');
        } else if (type.startsWith('genre-')) {
            const genreId = parseInt(type.split('-')[1]);
            filtered = moviesDB.filter(m => m.genres && m.genres.includes(genreId));
        }
        
        currentList = filtered.sort((a, b) => b.release_year - a.release_year);
        
        // UI de botones
        document.querySelectorAll('.tab-btn').forEach(b => {
            b.classList.remove('active');
            // Chequeamos si el onclick del botón coincide con el tipo
            if (b.getAttribute('onclick').includes(`'${type}'`)) b.classList.add('active');
        });
    }

    function filterData(type, btn) {
        sessionStorage.setItem('explorarFilter', type);
        applyFilterLogic(type);
        loadedCount = 20;
        sessionStorage.setItem('explorarCount', loadedCount);
        window.scrollTo({ top: 0, behavior: 'smooth' });
        renderExplore();
    }

    // --- NAVEGACIÓN Y SCROLL ---
    function verDetalle(id) {
        const m = moviesDB.find(x => x.id_tmdb == id);
        if (m) {
            localStorage.setItem('currentMovie', JSON.stringify(m));
            window.location.href = 'detalle.html';
        }
    }

    function handleScroll() {
        if (isLoading) return;

        // Guardar estado actual
        sessionStorage.setItem('explorarScroll', window.scrollY);

        // Carga infinita al llegar al final
        if ((window.innerHeight + window.scrollY) >= document.body.offsetHeight - 1000) {
            if (loadedCount < currentList.length) {
                isLoading = true;
                loadedCount += 20;
                sessionStorage.setItem('explorarCount', loadedCount);
                renderExplore();
            }
        }
    }

    window.addEventListener('scroll', handleScroll);
    document.addEventListener('DOMContentLoaded', initExplore);
</script>
