<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto | Peliskal</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="peliskal-logo.webp" type="image/x-icon">
    <style>
        .container { max-width: 800px; margin: 0 auto; padding: 20px 5%; line-height: 1.6; color: #d2d2d7; }
        h1 { color: white; margin-bottom: 20px; }
        .contact-form { background: rgba(255,255,255,0.05); padding: 20px; border-radius: 10px; margin-top: 20px; }
        input, textarea { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid rgba(255,255,255,0.2); border-radius: 5px; background: rgba(255,255,255,0.1); color: white; }
        button { background: var(--accent); color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-5GHP328QNM"></script>

<body>
    <nav id="navbar" class="scrolled">
        <div class="nav-top">
            <a href="index.html" class="logo">PELISKAL</a>
            <div class="search-wrapper">
                <input type="text" id="search" placeholder="Buscar películas o series..." autocomplete="off">
                <div id="search-preview" class="search-preview"></div>
            </div>
            <a href="explorar.html" style="color:white; text-decoration:none; font-size:0.9rem; opacity:0.7;">Explorar</a>
        </div>
    </nav>

    <div class="container">
        <h1>Contacto</h1>
        <p>¿Tienes preguntas, sugerencias o problemas? Contáctanos usando el formulario a continuación.</p>
        
        <div class="contact-form">
            <form action="#" method="post">
                <input type="text" name="name" placeholder="Tu nombre" required>
                <input type="email" name="email" placeholder="Tu email" required>
                <textarea name="message" rows="5" placeholder="Tu mensaje" required></textarea>
                <button type="submit">Enviar</button>
            </form>
        </div>
    </div>
